name: AFK Earn

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '运行时长（分钟）'
        required: false
        default: '300'
  schedule:
    - cron: '0 */8 * * *'

jobs:
  earn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install WARP
        run: |
          # Debian/Ubuntu
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ bookworm main" | sudo tee /etc/apt/sources.list.d/cloudflare-warp.list
          sudo apt update && sudo apt install -y cloudflare-warp

          # 启动并开启 WARP 服务
          sudo systemctl enable --now warp-svc
          sleep 2

          # 注册并连接（代理模式，不接管全局流量）
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos proxy port 40000
          warp-cli --accept-tos connect

          # 等待连接成功
          for i in {1..15}; do
              if warp-cli --accept-tos status | grep -q "Connected"; then
                  echo "WARP connected successfully!"
                  break
              fi
              echo "Waiting for WARP to connect..."
              sleep 2
          done

          # 验证
          curl --proxy socks5://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace
          # 应该看到 warp=on

      - name: Install dependencies
        run: |
          pip install seleniumbase pyvirtualdisplay
          seleniumbase install chromedriver

      - name: Run AFK Earn
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          WARP_PROXY: ""
          MAX_RUNTIME: ${{ github.event.inputs.duration || '300' }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python freeze_afk.py
